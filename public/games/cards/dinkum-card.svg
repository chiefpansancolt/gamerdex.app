<svg viewBox="0 0 300 365" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <clipPath id="card-clip-d">
      <rect x="4" y="4" width="292" height="357" rx="16"/>
    </clipPath>
    <clipPath id="img-clip-d">
      <rect x="16" y="60" width="268" height="125" rx="8"/>
    </clipPath>
    <clipPath id="icon-clip-d"><circle cx="258" cy="169" r="22"/></clipPath>
    <linearGradient id="accent-grad-d" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00D4FF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="card-bg-d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111828"/>
      <stop offset="100%" stop-color="#07090F"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="296" height="361" rx="18" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.15"/>

  <g clip-path="url(#card-clip-d)">
    <rect x="4" y="4" width="292" height="357" fill="url(#card-bg-d)"/>

    <g opacity="0.03" stroke="#00D4FF" stroke-width="0.5">
      <line x1="4" y1="60" x2="296" y2="60"/>
      <line x1="4" y1="120" x2="296" y2="120"/>
      <line x1="4" y1="180" x2="296" y2="180"/>
      <line x1="4" y1="240" x2="296" y2="240"/>
      <line x1="4" y1="300" x2="296" y2="300"/>
      <line x1="60" y1="4" x2="60" y2="361"/>
      <line x1="120" y1="4" x2="120" y2="361"/>
      <line x1="180" y1="4" x2="180" y2="361"/>
      <line x1="240" y1="4" x2="240" y2="361"/>
    </g>

    <rect x="4" y="4" width="292" height="2" fill="url(#accent-grad-d)"/>

    <text x="20" y="32" font-family="'Chakra Petch', sans-serif" font-weight="700" font-size="16" fill="#00D4FF" opacity="0.6">D</text>
    <text x="20" y="48" font-family="'Chakra Petch', sans-serif" font-weight="400" font-size="9" fill="#00D4FF" opacity="0.3" letter-spacing="0.1em">TRK</text>

    <g transform="translate(262, 14) scale(0.28)" opacity="0.4">
      <rect fill="#00D4FF" x="40" y="6" width="20" height="10"/>
      <rect fill="#00D4FF" x="30" y="16" width="40" height="10"/>
      <rect fill="#00D4FF" x="30" y="26" width="40" height="10"/>
      <rect fill="#00D4FF" x="20" y="36" width="60" height="10"/>
      <rect fill="#00D4FF" x="35" y="46" width="30" height="10"/>
      <rect fill="#00D4FF" x="30" y="64" width="14" height="10"/>
      <rect fill="#00D4FF" x="56" y="64" width="14" height="10"/>
      <rect fill="#00D4FF" x="24" y="74" width="18" height="8"/>
      <rect fill="#00D4FF" x="58" y="74" width="18" height="8"/>
    </g>

    <g clip-path="url(#img-clip-d)">
      <image href="dinkum.jpg" x="16" y="60" width="268" height="125" preserveAspectRatio="xMidYMid meet"/>
    </g>
    <rect x="16" y="60" width="268" height="125" rx="8" fill="none" stroke="#00D4FF" stroke-width="0.5" opacity="0.2"/>

    <!-- Game icon — bottom left -->
    <clipPath id="icon-clip-d2"><rect x="16" y="305" width="40" height="40" rx="8"/></clipPath>
    <image href="dinkum-icon.png" x="16" y="305" width="40" height="40" preserveAspectRatio="xMidYMid slice" clip-path="url(#icon-clip-d2)"/>

    <line x1="40" y1="205" x2="260" y2="205" stroke="#00D4FF" stroke-width="0.5" opacity="0.15"/>

    <text x="150" y="240" font-family="'Chakra Petch', sans-serif" font-weight="700" font-size="22" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.02em">DINKUM</text>
    <text x="150" y="263" font-family="'Chakra Petch', sans-serif" font-weight="400" font-size="11" fill="#00D4FF" text-anchor="middle" letter-spacing="0.25em" opacity="0.8">TRACKER</text>

    <line x1="100" y1="285" x2="200" y2="285" stroke="#00D4FF" stroke-width="0.5" opacity="0.1"/>

    <g transform="translate(132, 295) scale(0.35)" opacity="0.08">
      <rect fill="#00D4FF" x="40" y="6" width="20" height="10"/>
      <rect fill="#00D4FF" x="30" y="16" width="40" height="10"/>
      <rect fill="#00D4FF" x="30" y="26" width="40" height="10"/>
      <rect fill="#00D4FF" x="20" y="36" width="60" height="10"/>
      <rect fill="#00D4FF" x="35" y="46" width="30" height="10"/>
      <rect fill="#00D4FF" opacity="0.65" x="35" y="56" width="30" height="8"/>
      <rect fill="#00D4FF" x="30" y="64" width="14" height="10"/>
      <rect fill="#00D4FF" x="56" y="64" width="14" height="10"/>
      <rect fill="#00D4FF" x="24" y="74" width="18" height="8"/>
      <rect fill="#00D4FF" x="58" y="74" width="18" height="8"/>
    </g>

    <g transform="translate(280, 351) rotate(180)">
      <text x="0" y="12" font-family="'Chakra Petch', sans-serif" font-weight="700" font-size="16" fill="#00D4FF" opacity="0.6">D</text>
      <text x="0" y="28" font-family="'Chakra Petch', sans-serif" font-weight="400" font-size="9" fill="#00D4FF" opacity="0.3" letter-spacing="0.1em">TRK</text>
    </g>

    <rect x="4" y="359" width="292" height="2" fill="url(#accent-grad-d)"/>
  </g>

  <rect x="4" y="4" width="292" height="357" rx="16" fill="none" stroke="#1a1e2a" stroke-width="1"/>
</svg>
